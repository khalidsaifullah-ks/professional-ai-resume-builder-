<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <style>
    .text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: none;
      stroke: #6366f1;
      stroke-width: 2.5;
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: draw 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards, fillText 1.2s cubic-bezier(0.4, 0, 0.2, 1) 2.6s forwards;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fillText {
      to { fill: #818cf8; stroke: none; }
    }
  </style>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="text">Minimalist ResumeBuilder</text>
</svg>
